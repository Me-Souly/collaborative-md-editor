services:
    - type: web
      name: diploma-api
      runtime: node
      buildCommand: cd server && npm ci --only=production
      startCommand: cd server && node index.js
      plan: free
      healthCheckPath: /api/health
      envVars:
          - key: NODE_ENV
            value: production
          - key: PORT
            value: 5000
          - key: CLIENT_URL
            value: https://diploma-client.onrender.com # URL фронтенда для CORS
          - key: DB_URL
            sync: false # Вводится вручную в dashboard
          - key: REDIS_URL
            sync: false # Вводится вручную в dashboard
          - key: JWT_ACCESS_SECRET
            generateValue: true
          - key: JWT_REFRESH_SECRET
            generateValue: true
          - key: SMTP_HOST
            value: smtp.gmail.com
          - key: SMTP_PORT
            value: 587
          - key: SMTP_USER
            sync: false
          - key: SMTP_PASSWORD
            sync: false
          - key: MODERATOR_EMAIL
            sync: false
          - key: MODERATOR_LOGIN
            value: moderator
          - key: MODERATOR_PASSWORD
            sync: false

    - type: web
      name: diploma-client
      runtime: static
      buildCommand: cd client && npm install --legacy-peer-deps && npm run build
      staticPublishPath: ./client/build
      routes:
          - type: rewrite
            source: /*
            destination: /index.html
      envVars:
          - key: REACT_APP_API_URL
            value: https://diploma-api.onrender.com/api
          - key: REACT_APP_WS_URL
            value: wss://diploma-api.onrender.com
          - key: NODE_ENV
            value: production
